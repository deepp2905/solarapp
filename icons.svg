<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Default state: dashed outline circle -->
  <symbol id="icon-dashed" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor"
            stroke-width="1.5" stroke-dasharray="3 3" />
  </symbol>

  <!-- Complete: filled circle with checkmark -->
  <symbol id="icon-check" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="currentColor" />
    <path d="M7.5 12.5l3 3 6-6.5" fill="none" stroke="#fff"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </symbol>

  <!-- Warning: circle with ! -->
  <symbol id="icon-warning" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="currentColor" />
    <path d="M12 7v6" fill="none" stroke="#fff" stroke-width="2"
          stroke-linecap="round" />
    <circle cx="12" cy="16.5" r="1.25" fill="#fff" />
  </symbol>

  <!-- Error: circle with ! (same glyph, red via color) -->
  <symbol id="icon-error" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="currentColor" />
    <path d="M12 7v6" fill="none" stroke="#fff" stroke-width="2"
          stroke-linecap="round" />
    <circle cx="12" cy="16.5" r="1.25" fill="#fff" />
  </symbol>

  <!-- Chevron -->
  <symbol id="icon-chevron" viewBox="0 0 24 24">
    <path d="M6 15l6-6 6 6" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </symbol>

  <!-- Arrows -->
  <symbol id="icon-arrow-left" viewBox="0 0 24 24">
    <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </symbol>
  <symbol id="icon-arrow-right" viewBox="0 0 24 24">
    <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </symbol>

  <!-- Camera -->
  <symbol id="icon-camera" viewBox="0 0 24 24">
    <path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L19 6h0a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8z"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
    <circle cx="11.5" cy="13" r="3.5" fill="none" stroke="currentColor" stroke-width="2" />
  </symbol>

  <!-- Image -->
  <symbol id="icon-image" viewBox="0 0 24 24">
    <rect x="3" y="4" width="18" height="16" rx="2" fill="none"
          stroke="currentColor" stroke-width="2" />
    <circle cx="8.5" cy="9.5" r="1.5" fill="currentColor" />
    <path d="M21 16l-5-5L5 20" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </symbol>

  <!-- Pin -->
  <symbol id="icon-pin" viewBox="0 0 24 24">
    <path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11z"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
    <circle cx="12" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="2" />
  </symbol>
</svg>
